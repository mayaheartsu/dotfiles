[accessibility]
ui_scale = 1.1500000096857548

[bar.default]
capsule = true
capsule_radius = 4
center = [ "active_window" ]
end = [
    "media",
    "tray",
    "notifications",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "clock",
    "control-center",
    "session"
]
margin_ends = 0
padding = 2
radius = 0
start = [ "launcher", "workspaces", "group:g1" ]

    [[bar.default.capsule_group]]
    enabled = true
    fill = "surface_variant"
    id = "g1"
    members = [ "cpu", "temp", "sysmon", "ram" ]
    opacity = 1.0
    padding = 6.0

[control_center]
hidden_tabs = [ "monitor" ]

    [[control_center.shortcuts]]
    type = "weather"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "notification"

    [[control_center.shortcuts]]
    type = "screen_time"

[desktop_widgets]
enabled = false
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
active_monitor_only = true
enabled = true
icon_size = 72
magnification_scale = 1.3500000052154064
radius = 20
radius_bottom_left = 0
radius_bottom_right = 0
radius_top_left = 0
radius_top_right = 0
reserve_space = false
show_dots = true
smart_auto_hide = true

[location]
address = "Denver, United States"

[lockscreen]
enabled = false

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-2", "lockscreen-login-box@DP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-2"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-2".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[notification]
layer = "overlay"
position = "top_center"

[shell]
corner_radius_scale = 0.20000000298023224
font_family = "Inter"
screen_time_enabled = true

    [shell.panel]
    transparency_mode = "glass"

[theme]
builtin = "Ayu"
community_palette = "Oxocarbon"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-rainbow"

[wallpaper]
directory = "/home/maya/.config/hypr/wallpapers"

    [wallpaper.default]
    path = "/home/maya/.config/hypr/wallpapers/wallpaper.jpg"

    [wallpaper.last]
    path = "/home/maya/.config/hypr/wallpapers/wallpaper.jpg"

    [wallpaper.monitors.DP-1]
    path = "/home/maya/.config/hypr/wallpapers/wallpaper.jpg"

    [wallpaper.monitors.DP-2]
    path = "/home/maya/.config/hypr/wallpapers/wallpaper.jpg"

    [[wallpaper.favorite]]
    palette_source = "wallpaper"
    path = "/home/maya/.config/hypr/wallpapers/wallpaper.jpg"
    theme_mode = "dark"
    wallpaper_scheme = "m3-content"

[weather]
unit = "imperial"

[widget.active_window]
max_length = 720
title_scroll = "always"

[widget.bluetooth]
enabled = false

[widget.clock]
format = "{:%A, %B %d - %-I:%M %p}"

[widget.cpu]
display = "text"

[widget.media]
max_length = 240
title_scroll = "on_hover"

[widget.network]
enabled = false

[widget.ram]
display = "text"

[widget.sysmon]
display = "text"
stat = "gpu_temp"

[widget.temp]
display = "text"

[widget.workspaces]
focused_output_only = true
